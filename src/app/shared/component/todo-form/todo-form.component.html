<div class="card mt-5">
  <div class="card-body">
    <h2 class="text-center p-3 bg-primary">
      {{ isIneditMode ? "Update Todo" : "Add Todo" }}
    </h2>
    <form #todoForm="ngForm" (ngSubmit)="onTodoSubmit()">
      <div class="form-group">
        <label for="title">Title</label>
        <input name="title" required ngModel type="text" class="form-control" />
      </div>
      <button
        [disabled]="todoForm.invalid"
        *ngIf="!isIneditMode"
        type="submit"
        mat-raised-button
        color="primary"
        class="w-100"
      >
        Add Todo
      </button>
      <button
        (click)="Updatetodo()"
        [disabled]="todoForm.invalid"
        *ngIf="isIneditMode"
        type="button"
        mat-raised-button
        color="primary"
        class="w-100"
      >
        Update Todo
      </button>
    </form>
  </div>
</div>
